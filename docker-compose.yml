version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whaleradar-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - whaleradar

  db:
    image: postgres:16-alpine
    container_name: whaleradar-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - whaleradar

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: whaleradar-db-init
    environment:
      - DATABASE_URL=${DATABASE_URL}
    entrypoint: ["sh", "-c", "sleep 2 && ./node_modules/.bin/prisma db push --skip-generate"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - whaleradar

  realtime:
    build:
      context: ./mini-services/realtime-service
      dockerfile: Dockerfile
    container_name: whaleradar-realtime
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
    networks:
      - whaleradar

  caddy:
    image: caddy:2-alpine
    container_name: whaleradar-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - realtime
    networks:
      - whaleradar

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  whaleradar:
    driver: bridge
